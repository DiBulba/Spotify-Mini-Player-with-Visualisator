[LabelFontHint]
Meter=String
X=#BaseX#
Y=236
W=560
FontFace=Segoe UI
FontSize=11
FontColor=255,255,255,120
AntiAlias=1
Text=Enter font name as it appears in Windows (e.g. Consolas Bold, Arial). Custom fonts go in @Resources\Fonts\.
ClipString=2

[Divider]
Meter=Shape
Shape=Line 0,0,560,0 | Fill Color 255,255,255,40 | StrokeWidth 1
X=#BaseX#
Y=278

[SectionAudio]
Meter=String
