[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
CodePage=65001
OnRefreshAction=[!Move (#SCREENAREAWIDTH#/2)-320 (#SCREENAREAHEIGHT#/2)-280]
SkinWidth=640
SkinHeight=100

[Metadata]
Name=Minimal Spotify Visualizer Settings
Author=DiBulba
Version=1.2

[Variables]
@include=#@#variables.inc
BaseX=40
AccentColor=255,255,255,255
BackgroundColor=0,0,0,180

[mInputTrackFont]
Measure=Plugin
Plugin=InputText
W=280
H=36
X=(#BaseX# + 8)
Y=108
SolidColor=#AccentColor#
FontColor=0,0,0,255
StringAlign=Left
FontFace=Segoe UI
FontSize=14
Command1=[!WriteKeyValue Variables TrackFont "$UserInput$" "#@#variables.inc"][!Refresh "Minimalizm_Spotify_Visualizer" "MinimalSpotifyVisualizer.ini"][!Refresh]

[mInputTrackSize]
Measure=Plugin
Plugin=InputText
W=60
H=36
X=(#BaseX# + 298)
Y=108
SolidColor=#AccentColor#
FontColor=0,0,0,255
StringAlign=Left
FontFace=Segoe UI
FontSize=14
Command1=[!WriteKeyValue Variables TrackFontSize "$UserInput$" "#@#variables.inc"][!Refresh "Minimalizm_Spotify_Visualizer" "MinimalSpotifyVisualizer.ini"][!Refresh]

[mInputTimeFont]
Measure=Plugin
Plugin=InputText
W=280
H=36
X=(#BaseX# + 8)
Y=188
SolidColor=#AccentColor#
FontColor=0,0,0,255
StringAlign=Left
FontFace=Segoe UI
FontSize=14
Command1=[!WriteKeyValue Variables TimeFont "$UserInput$" "#@#variables.inc"][!Refresh "Minimalizm_Spotify_Visualizer" "MinimalSpotifyVisualizer.ini"][!Refresh]

[mInputTimeSize]
Measure=Plugin
Plugin=InputText
W=60
H=36
X=(#BaseX# + 298)
Y=188
SolidColor=#AccentColor#
FontColor=0,0,0,255
StringAlign=Left
FontFace=Segoe UI
FontSize=14
Command1=[!WriteKeyValue Variables TimeFontSize "$UserInput$" "#@#variables.inc"][!Refresh "Minimalizm_Spotify_Visualizer" "MinimalSpotifyVisualizer.ini"][!Refresh]

[MeasureDevices]
Measure=Script
ScriptFile=#@#audio_devices.lua

[Background]
Meter=Image
W=640
H=2000
SolidColor=#BackgroundColor#

[Title]
Meter=String
X=#BaseX#
Y=24
FontFace=Segoe UI
FontSize=20
FontColor=#AccentColor#
AntiAlias=1
Text=Settings

; ═══════════════════════════════════
;  FONTS SECTION
; ═══════════════════════════════════
[BtnToggleFonts]
Meter=String
X=#BaseX#
Y=64
W=560
H=28
FontFace=Segoe UI
FontSize=13
FontColor=255,255,255,210
AntiAlias=1
SolidColor=255,255,255,20
Padding=8,4,0,0
Text=▼  Fonts
LeftMouseUpAction=[!ToggleGroup FontsSection][!UpdateMeter *][!Redraw]
DynamicVariables=1

[LabelTrackFont]
Meter=String
X=#BaseX#
Y=100
FontFace=Segoe UI
FontSize=13
FontColor=#AccentColor#
AntiAlias=1
Text=Track font name
Group=FontsSection

[BtnTrackFont]
Meter=String
X=#BaseX#
Y=120
W=280
H=36
FontFace=Segoe UI
FontSize=14
FontColor=0,0,0,255
AntiAlias=1
SolidColor=#AccentColor#
StringAlign=Left
Padding=8,8,0,0
Text=#TrackFont#
LeftMouseUpAction=[!CommandMeasure "mInputTrackFont" "ExecuteBatch 1"]
Group=FontsSection
DynamicVariables=1

[LabelTrackSize]
Meter=String
X=(#BaseX# + 298)
Y=100
FontFace=Segoe UI
FontSize=13
FontColor=#AccentColor#
AntiAlias=1
Text=Size
Group=FontsSection

