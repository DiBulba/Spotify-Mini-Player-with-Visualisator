[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
CodePage=65001
OnRefreshAction=[!Move (#SCREENAREAWIDTH#/2)-320 (#SCREENAREAHEIGHT#/2)-280]
SkinWidth=640
SkinHeight=560

[Metadata]
Name=Minimal Spotify Visualizer Settings
Author=DiBulba
Version=1.2

[Variables]
@include=#@#variables.inc
BaseX=40
AccentColor=255,255,255,255
BackgroundColor=0,0,0,180

[mInputTrackFont]
Measure=Plugin
Plugin=InputText
W=280
H=36
X=(#BaseX# + 8)
Y=108
SolidColor=#AccentColor#
FontColor=0,0,0,255
StringAlign=Left
FontFace=Segoe UI
FontSize=14
Command1=[!WriteKeyValue Variables TrackFont "$UserInput$" "#@#variables.inc"][!Refresh "Minimalizm_Spotify_Visualizer" "MinimalSpotifyVisualizer.ini"][!Refresh]

[mInputTrackSize]
Measure=Plugin
Plugin=InputText
W=60
H=36
X=(#BaseX# + 298)
Y=108
SolidColor=#AccentColor#
FontColor=0,0,0,255
StringAlign=Left
FontFace=Segoe UI
FontSize=14
Command1=[!WriteKeyValue Variables TrackFontSize "$UserInput$" "#@#variables.inc"][!Refresh "Minimalizm_Spotify_Visualizer" "MinimalSpotifyVisualizer.ini"][!Refresh]

[mInputTimeFont]
Measure=Plugin
Plugin=InputText
W=280
H=36
X=(#BaseX# + 8)
Y=188
SolidColor=#AccentColor#
FontColor=0,0,0,255
StringAlign=Left
FontFace=Segoe UI
FontSize=14
Command1=[!WriteKeyValue Variables TimeFont "$UserInput$" "#@#variables.inc"][!Refresh "Minimalizm_Spotify_Visualizer" "MinimalSpotifyVisualizer.ini"][!Refresh]

[mInputTimeSize]
Measure=Plugin
Plugin=InputText
W=60
H=36
X=(#BaseX# + 298)
Y=188
SolidColor=#AccentColor#
FontColor=0,0,0,255
StringAlign=Left
FontFace=Segoe UI
FontSize=14
Command1=[!WriteKeyValue Variables TimeFontSize "$UserInput$" "#@#variables.inc"][!Refresh "Minimalizm_Spotify_Visualizer" "MinimalSpotifyVisualizer.ini"][!Refresh]

[MeasureDevices]
Measure=Script
ScriptFile=#@#audio_devices.lua
OnUpdateAction=[!UpdateMeter *][!Redraw]

[Background]
Meter=Image
W=640
H=560
SolidColor=#BackgroundColor#

[Title]
Meter=String
X=#BaseX#
Y=24
FontFace=Segoe UI
FontSize=20
FontColor=#AccentColor#
AntiAlias=1
Text=Settings

[SectionFonts]
Meter=String
X=#BaseX#
Y=68
FontFace=Segoe UI
FontSize=13
FontColor=255,255,255,180
AntiAlias=1
Text=— Fonts

[LabelTrackFont]
Meter=String
X=#BaseX#
Y=88
FontFace=Segoe UI
FontSize=13
FontColor=#AccentColor#
AntiAlias=1
Text=Track font name

[BtnTrackFont]
Meter=String
X=#BaseX#
Y=108
W=280
H=36
FontFace=Segoe UI
FontSize=14
FontColor=0,0,0,255
AntiAlias=1
SolidColor=#AccentColor#
StringAlign=Left
Padding=8,8,0,0
Text=#TrackFont#
LeftMouseUpAction=[!CommandMeasure "mInputTrackFont" "ExecuteBatch 1"]
DynamicVariables=1

[LabelTrackSize]
Meter=String
X=(#BaseX# + 298)
Y=88
FontFace=Segoe UI
FontSize=13
FontColor=#AccentColor#
AntiAlias=1
Text=Size

[BtnTrackSize]
Meter=String
X=(#BaseX# + 298)
Y=108
W=60
H=36
FontFace=Segoe UI
FontSize=14
FontColor=0,0,0,255
AntiAlias=1
SolidColor=#AccentColor#
StringAlign=Left
Padding=8,8,0,0
Text=#TrackFontSize#
LeftMouseUpAction=[!CommandMeasure "mInputTrackSize" "ExecuteBatch 1"]
DynamicVariables=1

[LabelTimeFont]
Meter=String
X=#BaseX#
Y=168
FontFace=Segoe UI
FontSize=13
FontColor=#AccentColor#
AntiAlias=1
Text=Time font name

[BtnTimeFont]
Meter=String
X=#BaseX#
Y=188
W=280
H=36
FontFace=Segoe UI
FontSize=14
FontColor=0,0,0,255
AntiAlias=1
SolidColor=#AccentColor#
StringAlign=Left
Padding=8,8,0,0
Text=#TimeFont#
LeftMouseUpAction=[!CommandMeasure "mInputTimeFont" "ExecuteBatch 1"]
DynamicVariables=1

[LabelTimeSize]
Meter=String
X=(#BaseX# + 298)
Y=168
FontFace=Segoe UI
FontSize=13
FontColor=#AccentColor#
AntiAlias=1
Text=Size

[BtnTimeSize]
Meter=String
X=(#BaseX# + 298)
Y=188
W=60
H=36
