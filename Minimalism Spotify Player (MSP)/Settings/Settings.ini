StringAlign=Left
Padding=8,8,0,0
Text=#TrackFontSize#
LeftMouseUpAction=[!CommandMeasure "mInputTrackSize" "ExecuteBatch 1"]
Group=FontsSection
DynamicVariables=1

[LabelTimeFont]
Meter=String
X=#BaseX#
Y=168
FontFace=Segoe UI
FontSize=13
FontColor=#AccentColor#
AntiAlias=1
Text=Time font name
Group=FontsSection

[BtnTimeFont]
Meter=String
X=#BaseX#
Y=188
W=280
H=36
FontFace=Segoe UI
FontSize=14
FontColor=0,0,0,255
AntiAlias=1
SolidColor=#AccentColor#
StringAlign=Left
Padding=8,8,0,0
Text=#TimeFont#
LeftMouseUpAction=[!CommandMeasure "mInputTimeFont" "ExecuteBatch 1"]
Group=FontsSection
DynamicVariables=1

[LabelTimeSize]
Meter=String
X=(#BaseX# + 298)
Y=168
FontFace=Segoe UI
FontSize=13
FontColor=#AccentColor#
AntiAlias=1
Text=Size
Group=FontsSection

[BtnTimeSize]
Meter=String
X=(#BaseX# + 298)
Y=188
W=60
H=36
FontFace=Segoe UI
FontSize=14
FontColor=0,0,0,255
AntiAlias=1
SolidColor=#AccentColor#
StringAlign=Left
Padding=8,8,0,0
Text=#TimeFontSize#
LeftMouseUpAction=[!CommandMeasure "mInputTimeSize" "ExecuteBatch 1"]
Group=FontsSection
DynamicVariables=1

[LabelFontHint]
Meter=String
X=#BaseX#
Y=236
W=560
FontFace=Segoe UI
FontSize=11
FontColor=255,255,255,120
AntiAlias=1
Text=Enter font name as in Windows (e.g. Consolas Bold, Arial). Custom fonts go in @Resources\Fonts\.
ClipString=2
Group=FontsSection

[DividerFonts]
Meter=Shape
Shape=Line 0,0,560,0 | Fill Color 255,255,255,40 | StrokeWidth 1
X=#BaseX#
Y=272
Group=FontsSection

